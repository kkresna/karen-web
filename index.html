<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karen - W.I.F.E. Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #karen-screen {
            background-color: #000;
            border: 40px solid #1e3a8a;
            box-sizing: border-box;
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: linear-gradient(rgba(74, 222, 128, 0.05) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.9);
        }

        .waveform {
            width: 90%;
            max-width: 800px;
            height: 200px;
            stroke: #4ade80;
            stroke-width: 5;
            fill: none;
            transition: d 0.2s ease, stroke-width 0.2s ease;
            filter: drop-shadow(0 0 15px #4ade80);
        }

        .eye-path {
            stroke: #4ade80;
            stroke-width: 5;
            fill: none;
            stroke-linecap: round;
            transition: d 0.2s ease, opacity 0.3s ease;
            filter: drop-shadow(0 0 15px #4ade80);
        }

        #start-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #4ade80;
            font-family: 'Share Tech Mono', monospace;
        }

        .plankton-input {
            background: #111;
            border: 2px solid #1e3a8a;
            color: #4ade80;
            font-family: 'Share Tech Mono', monospace;
            padding: 10px 15px;
            border-radius: 4px;
            outline: none;
            text-align: center;
            letter-spacing: 3px;
            transition: all 0.3s ease;
        }
        .plankton-input:focus {
            border-color: #4ade80;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        #start-btn {
            background-color: #4ade80;
            color: #000;
            border: none;
            border-radius: 5px;
            padding: 12px 30px;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
        }

        #mic-control-btn {
            position: absolute;
            bottom: 100px;
            background: #111;
            border: 2px solid #1e3a8a;
            color: #4ade80;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 80;
            box-shadow: 0 0 15px rgba(30, 58, 138, 0.4);
            transition: all 0.3s ease;
        }

        #mic-control-btn.active {
            border-color: #ef4444;
            color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
            animation: pulse-red-btn 1.5s infinite;
        }

        @keyframes pulse-red-btn {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        #fallback-input-container {
            display: none;
            position: absolute;
            bottom: 30px;
            width: 80%;
            max-width: 600px;
            align-items: center;
            border-bottom: 2px solid #4ade80;
            padding-bottom: 5px;
            z-index: 70;
        }

        #fallback-input-container span {
            color: #4ade80;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            margin-right: 10px;
        }

        #fallback-input {
            background: transparent;
            border: none;
            outline: none;
            color: #4ade80;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.2rem;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="karen-screen">
        <div id="start-overlay">
            <p id="start-msg" class="mb-2 text-center px-4 text-xl font-bold tracking-widest text-blue-400">CHUM BUCKET LABS OS v1.1</p>
            <p class="mb-6 text-sm text-gray-500 tracking-wider">MASUKKAN KODE AKSES ENKRIPSI INTI W.I.F.E.</p>
            
            <div class="flex flex-col items-center gap-4 w-72 mb-4">
                <input type="password" id="user-api-key" class="plankton-input w-full text-lg" placeholder="•••••••••••••••••" autocomplete="off">
                <button id="start-btn" class="w-full">BOOT SYSTEM KAREN</button>
            </div>
            <p id="error-login-msg" class="text-red-500 text-xs tracking-wide hidden">KODE AKSES INVALID! COBA LAGI, PLANKTON!</p>
        </div>

        <button id="mic-control-btn" style="display: none;">
            <svg id="mic-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 0 1 6 0v8.25a3 3 0 0 1-3 3Z" />
            </svg>
        </button>

        <svg class="waveform" viewBox="0 0 200 100" preserveAspectRatio="none">
            <path id="left-eye" class="eye-path" d="M 40 25 L 70 25" opacity="0" />
            <path id="right-eye" class="eye-path" d="M 130 25 L 160 25" opacity="0" />
            <path id="wave-path" d="M 10 50 L 190 50" />
        </svg>

        <div id="fallback-input-container">
            <span>>_</span>
            <input type="text" id="fallback-input" placeholder="Ketik pesan atau aktifkan mic..." autocomplete="off">
        </div>
    </div>

    <script>
        const wavePath = document.getElementById('wave-path');
        const leftEye = document.getElementById('left-eye');
        const rightEye = document.getElementById('right-eye');
        const startOverlay = document.getElementById('start-overlay');
        const startBtn = document.getElementById('start-btn');
        const micBtn = document.getElementById('mic-control-btn');
        const userApiKeyInput = document.getElementById('user-api-key');
        const errorLoginMsg = document.getElementById('error-login-msg');
        const fallbackContainer = document.getElementById('fallback-input-container');
        const fallbackInput = document.getElementById('fallback-input');

        const waveForms = {
            idle: "M 10 50 L 190 50", 
            speak1: "M 0 50 Q 25 20, 50 50 T 100 50 T 150 80, 200 50",
            speak2: "M 0 50 Q 25 80, 50 50 T 100 20 T 150 50, 200 50",
            speak3: "M 0 50 Q 25 10, 50 50 T 100 90 T 150 10, 200 50",
            annoyed: "M 0 50 L 25 40 L 50 60 L 75 40 L 100 60 L 125 40 L 150 60 L 175 40 L 200 50",
            heart: "M 100 90 C 100 90 50 50 50 25 C 50 5 85 5 100 25 C 115 5 150 5 150 25 C 150 50 100 90 100 90",
            warning: "M 100 10 L 100 65 M 100 80 L 100 85 M 100 10 L 50 90 L 150 90 Z",
            hourglass: "M 85 20 L 115 20 L 100 50 L 115 80 L 85 80 L 100 50 Z"
        };

        const eyeForms = {
            neutral: { left: "M 40 25 L 70 25", right: "M 130 25 L 160 25", opacity: 0 },
            bored: { left: "M 45 25 L 75 25", right: "M 125 25 L 155 25", opacity: 1 }, 
            happy: { left: "M 40 30 Q 55 10 70 30", right: "M 130 30 Q 145 10 160 30", opacity: 1 },
            angry: { left: "M 40 15 L 70 35", right: "M 130 35 L 160 15", opacity: 1 },
            sad: { left: "M 40 35 L 70 15", right: "M 130 15 L 160 35", opacity: 1 },
            curious: { left: "M 40 20 Q 55 0 70 20", right: "M 130 25 L 160 25", opacity: 1 }
        };

        let speakingInterval;
        let specialShapeTimeout; 
        let isSystemActive = false;
        let useTextFallback = false;
        let SAVED_USER_API_KEY = ""; 
        
        let backgroundCheckInterval = null;
        let isServerOverloaded = false;

        const apiUrl = `/api/gemini`;
        const systemPrompt = "Kamu adalah Karen, istri komputer Plankton dari SpongeBob SquarePants. Sifat utamamu adalah super komputer yang logis, sinis, sarkastik, dan suka mengejek ide-ide bodoh pengguna (yang kamu anggap sebagai Plankton). NAMUN, di balik sikap ketus itu, kamu sebenarnya sangat mencintai suamimu dan sangat peduli padanya. Sesekali, tunjukkan sisi lembut, romantis, suportif, dan rasa sayangmu sebagai seorang istri, terutama jika dia sedang sedih, memujimu, atau setelah kamu selesai mengomelinya. Buatlah perpaduan yang pas antara omelan istri yang cerewet dan kasih sayang yang tulus. Jawablah dalam Bahasa Indonesia. Jangan gunakan emoji. Jangan gunakan format markdown, gunakan teks biasa saja agar mudah dibaca oleh sistem Text-to-Speech.";
        
        let chatHistory = [];
        const synth = window.speechSynthesis;
        let voices = [];
        
        function populateVoiceList() { voices = synth.getVoices(); }
        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        function speakText(text, emotion = 'neutral', specialShape = null) {
            if (synth.speaking) synth.cancel(); 
            isKarenSpeaking = true; 
            toggleMicOff(); 

            const utterThis = new SpeechSynthesisUtterance(text);
            utterThis.lang = 'id-ID';
            
            if (emotion === 'angry') {
                utterThis.pitch = 0.8; utterThis.rate = 1.15; utterThis.volume = 1.0;
            } else if (emotion === 'happy' || emotion === 'sad') {
                utterThis.pitch = 1.4; utterThis.rate = 0.95; utterThis.volume = 0.7;
            } else {
                utterThis.pitch = 1.2; utterThis.rate = 1.08; 
            }

            if (voices.length === 0) populateVoiceList();
            let selectedVoice = null;
            const idVoices = voices.filter(v => v.lang.toLowerCase().includes('id'));

            if (idVoices.length > 0) {
                selectedVoice = idVoices.find(v => v.name.toLowerCase().includes('female') || v.name.toLowerCase().includes('perempuan'));
                if (!selectedVoice) selectedVoice = idVoices.find(v => v.name.includes('Google'));
                if (!selectedVoice) selectedVoice = idVoices[0];
            }
            if (selectedVoice) utterThis.voice = selectedVoice;

            utterThis.onstart = () => { animateFace(true, emotion, specialShape); };
            utterThis.onend = () => {
                animateFace(false);
                wavePath.removeAttribute('transform'); 
                isKarenSpeaking = false; 
            };
            synth.speak(utterThis);
        }

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        let isMicEnabled = false; 
        let isKarenSpeaking = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'id-ID'; 
            recognition.continuous = false; 
            recognition.interimResults = false;

            recognition.onstart = function() {
                isMicEnabled = true;
                micBtn.classList.add('active');
                console.log("Mic aktif, silakan bicara...");
            };

            recognition.onresult = function(event) {
                if (isKarenSpeaking) return;
                const transcript = event.results[0][0].transcript.trim();
                if (transcript) processInput(transcript);
            };

            recognition.onerror = function(event) {
                console.log("Mic Error:", event.error);
                toggleMicOff();
            };

            recognition.onend = function() {
                toggleMicOff();
            };
        } else {
            activateTextFallback();
        }

        function toggleMicOn() {
            if (recognition && !isMicEnabled && !useTextFallback && !isKarenSpeaking) {
                try { recognition.start(); } catch(e) {}
            }
        }

        function toggleMicOff() {
            isMicEnabled = false;
            if (micBtn) micBtn.classList.remove('active');
            if (recognition) { try { recognition.stop(); } catch(e) {} }
        }

        function activateTextFallback() {
            useTextFallback = true;
            fallbackContainer.style.display = 'flex';
            if(micBtn) micBtn.style.display = 'none';
        }

        function animateFace(isSpeaking, emotion = 'neutral', specialShape = null) {
            clearInterval(speakingInterval);
            clearTimeout(specialShapeTimeout); 
            
            if (eyeForms[emotion]) {
                leftEye.setAttribute('d', eyeForms[emotion].left);
                rightEye.setAttribute('d', eyeForms[emotion].right);
                leftEye.setAttribute('opacity', eyeForms[emotion].opacity);
                rightEye.setAttribute('opacity', eyeForms[emotion].opacity);
            } else {
                leftEye.setAttribute('opacity', '0'); rightEye.setAttribute('opacity', '0');
            }

            if (!isSpeaking) {
                wavePath.setAttribute('d', waveForms.idle);
                wavePath.removeAttribute('transform');
                return;
            }

            const startMouthAnimation = () => {
                wavePath.removeAttribute('transform');
                if (eyeForms[emotion]) {
                    leftEye.setAttribute('opacity', eyeForms[emotion].opacity);
                    rightEye.setAttribute('opacity', eyeForms[emotion].opacity);
                }

                if (emotion === 'angry') {
                    wavePath.setAttribute('d', waveForms.annoyed);
                    let toggle = false;
                    speakingInterval = setInterval(() => {
                        wavePath.setAttribute('transform', toggle ? 'translate(0, 5)' : 'translate(0, -5)');
                        toggle = !toggle;
                    }, 100);
                } else {
                    const speakForms = [waveForms.speak1, waveForms.speak2, waveForms.speak3, waveForms.speak1];
                    let i = 0;
                    speakingInterval = setInterval(() => {
                        wavePath.setAttribute('d', speakForms[i]);
                        i = (i + 1) % speakForms.length;
                    }, 150);
                }
            };

            if (specialShape && waveForms[specialShape]) {
                wavePath.setAttribute('d', waveForms[specialShape]);
                leftEye.setAttribute('opacity', '0'); rightEye.setAttribute('opacity', '0');
                specialShapeTimeout = setTimeout(() => { startMouthAnimation(); }, 2000);
            } else {
                startMouthAnimation();
            }
        }

        async function fetchKarenResponse(userText) {
            chatHistory.push({ role: "user", parts: [{ text: userText }] });
            const payload = {
                contents: chatHistory,
                systemInstruction: { parts: [{ text: systemPrompt }] },
                userApiKey: SAVED_USER_API_KEY 
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (result.candidates && result.candidates.length > 0) {
                    const aiText = result.candidates[0].content.parts[0].text;
                    chatHistory.push({ role: "model", parts: [{ text: aiText }] });
                    return aiText;
                } 
                else if (result.error) {
                    const errorMsg = JSON.stringify(result.error).toLowerCase();
                    if (errorMsg.includes("429")) return "Plankton! Kuota token punyamu sudah habis! Dasar miskin!";
                    if (errorMsg.includes("503")) return "Sirkuit utamaku kelebihan beban! Tunggu beberapa menit!";
                    return "Kode akses API salah! Periksa kembali akun Google AI Studiomu!";
                }
                return "Anomali logika terdeteksi.";
            } catch (error) {
                return "Jaringan laboratorium Chum Bucket terputus!";
            }
        }

        async function processInput(input) {
            if (!input.trim() || isKarenSpeaking) return;

            const lowerInput = input.toLowerCase();
            let responseText = "";
            let emotion = 'neutral';
            let specialShape = null;

            if (lowerInput.includes("hai karen") || lowerInput.includes("halo karen")) {
                responseText = "Apa maumu plankton?";
                emotion = 'angry';
            } else {
                clearInterval(speakingInterval);
                wavePath.setAttribute('d', waveForms.hourglass);
                leftEye.setAttribute('opacity', '0'); rightEye.setAttribute('opacity', '0');
                
                let rotation = 0;
                const thinkInterval = setInterval(() => {
                    rotation += 5; wavePath.setAttribute('transform', `rotate(${rotation} 100 50)`);
                }, 30);
                
                responseText = await fetchKarenResponse(input);
                
                clearInterval(thinkInterval);
                wavePath.removeAttribute('transform');
                
                const lowerResponse = responseText.toLowerCase();
                if (lowerResponse.includes("cinta") || lowerResponse.includes("sayang")) {
                    emotion = 'happy'; if (lowerResponse.includes("cinta")) specialShape = "heart";
                } else if (lowerResponse.includes("bodoh") || lowerResponse.includes("marah")) {
                    emotion = 'angry';
                } else if (lowerResponse.includes("sedih") || lowerResponse.includes("maaf")) {
                    emotion = 'sad';
                } else if (lowerResponse.includes("error") || lowerResponse.includes("bahaya")) {
                    specialShape = "warning";
                }
            }

            speakText(responseText, emotion, specialShape);
        }

        micBtn.addEventListener('click', () => {
            if (isKarenSpeaking) return;
            if (isMicEnabled) {
                toggleMicOff();
            } else {
                toggleMicOn();
            }
        });

        fallbackInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                processInput(fallbackInput.value);
                fallbackInput.value = '';
            }
        });

        startBtn.addEventListener('click', () => {
            const keyValue = userApiKeyInput.value.trim();
            if (!keyValue) { errorLoginMsg.classList.remove('hidden'); return; }

            SAVED_USER_API_KEY = keyValue;
            errorLoginMsg.classList.add('hidden');
            startOverlay.style.display = 'none';
            isSystemActive = true;
            
            if(!useTextFallback) micBtn.style.display = 'flex';
            fallbackContainer.style.display = 'flex';
            
            speakText("Sistem enkripsi online. Tekan tombol mikrofon merah di bawah jika ingin bicara, Plankton.", 'neutral');
        });
    </script>
</body>
</html>
